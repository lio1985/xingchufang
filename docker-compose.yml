version: '3.8'

services:
  # 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: star-kitchen-app
    restart: unless-stopped
    ports:
      - "3000:3000"  # 后端 API
      - "5000:5000"  # 前端 Web
    env_file:
      - server/.env
    environment:
      - NODE_ENV=production
    volumes:
      # 挂载日志目录
      - ./logs:/app/logs
      # 挂载上传文件目录
      - ./uploads:/app/uploads
    networks:
      - star-kitchen-network
    depends_on:
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis 缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: star-kitchen-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - star-kitchen-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: star-kitchen-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - star-kitchen-network

# 数据卷
volumes:
  redis-data:
    driver: local

# 网络
networks:
  star-kitchen-network:
    driver: bridge
