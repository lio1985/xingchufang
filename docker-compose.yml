version: '3.8'

services:
  # 后端 API 服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: star-kitchen-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - server/.env
    environment:
      - NODE_ENV=production
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - star-kitchen-network
    depends_on:
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: star-kitchen-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - star-kitchen-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Nginx 反向代理 + 前端静态文件
  nginx:
    image: nginx:alpine
    container_name: star-kitchen-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist-web:/usr/share/nginx/html:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - star-kitchen-network

volumes:
  redis-data:
    driver: local

networks:
  star-kitchen-network:
    driver: bridge
